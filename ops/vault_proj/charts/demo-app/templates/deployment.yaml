apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
      # Vault Agent Injector — must be annotations, not labels (paths like
      # secret/data/... are invalid as label values).
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "demo-app"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/demo/db"
        # Agent template is Vault/consul-template syntax; quote for Helm with backticks.
        vault.hashicorp.com/agent-inject-template-db: |
{{ `{{- with secret "secret/data/demo/db" -}}
username={{ .Data.data.username }}
password={{ .Data.data.password }}
{{- end -}}` | indent 10 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: demo-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.addr | quote }}
            - name: VAULT_SECRET_PATH
              value: {{ .Values.vault.secretPath | quote }}
            - name: VAULT_K8S_ROLE
              value: {{ .Values.vault.k8sRole | quote }}
            {{- if .Values.vault.token }}
            - name: VAULT_TOKEN
              value: {{ .Values.vault.token | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.tls.enabled }}
          # TODO(you): point the process at these files or use an HTTPS port — TASKS.md §3d
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          {{- end }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
      {{- end }}
