# kind cluster with secrets encryption-at-rest.
# Copy EncryptionConfiguration into the control-plane before creating the cluster
# (see scripts/kind-with-encryption.sh and TASKS.md §2).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: secrets-lab
nodes:
  - role: control-plane
    extraMounts:
      # Host path is filled by the bootstrap script
      - hostPath: ./k8s/encryption/EncryptionConfiguration.yaml
        containerPath: /etc/kubernetes/encryption-config.yaml
        readOnly: true
        propagation: None
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            encryption-provider-config: /etc/kubernetes/encryption-config.yaml
          extraVolumes:
            - name: encryption-config
              hostPath: /etc/kubernetes/encryption-config.yaml
              mountPath: /etc/kubernetes/encryption-config.yaml
              readOnly: true
              pathType: File
