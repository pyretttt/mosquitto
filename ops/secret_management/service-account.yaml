apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-reader-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-reader-role-binding
subjects:
  - kind: ServiceAccount
    name: config-reader
roleRef:
  kind: Role
  name: config-reader-role
  apiGroup: rbac.authorization.k8s.io