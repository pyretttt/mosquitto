name: little-ml-story

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-mlops}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
  POSTGRES_DB: ${POSTGRES_DB:-mlops}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_PREDICTION_TOPIC: predictions
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: 8123
  CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-mlops}
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
  TRITON_URL: triton:8001
  TRITON_MODEL_NAME: resnet50
  TRITON_MODEL_VERSION: "1"

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: ${POSTGRES_DB:-mlops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers redpanda:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create predictions --brokers redpanda:9092 --partitions 3 --replicas 1 || true
        rpk topic describe predictions --brokers redpanda:9092 || true
    restart: "no"

  redpanda-console:
    image: redpandadata/console:v2.7.2
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-mlops}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    restart: unless-stopped
    command:
      - tritonserver
      - --model-repository=/models
      - --model-control-mode=poll
      - --repository-poll-secs=30
      - --strict-model-config=false
      - --log-verbose=0
    volumes:
      - ./infra/triton/model_repository:/models:ro
    ports:
      - "8800:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      API_LOG_LEVEL: ${API_LOG_LEVEL:-INFO}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      triton:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps:/app/apps:ro
      - ./tests:/app/tests:ro
    labels:
      logs: "include"

  consumer:
    build:
      context: .
      dockerfile: apps/consumer/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps:ro
    labels:
      logs: "include"

  spark:
    build:
      context: .
      dockerfile: apps/spark_jobs/Dockerfile
    profiles: ["batch"]
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps:ro

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  clickhouse_data:

networks:
  default:
    name: little-ml-story
