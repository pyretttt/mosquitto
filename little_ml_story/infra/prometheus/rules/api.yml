groups:
  - name: api-slos
    interval: 30s
    rules:
      - alert: ApiHighErrorRate
        expr: |
          sum(rate(http_requests_total{service="api",status=~"5.."}[5m]))
            /
          sum(rate(http_requests_total{service="api"}[5m]))
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ">5% API 5xx error rate over 5m"

      - alert: ApiP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{service="api"}[5m]))
          ) > 1.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 1s for 10m"
