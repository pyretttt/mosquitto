global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api

  - job_name: triton
    metrics_path: /metrics
    static_configs:
      - targets: ['triton:8002']
        labels:
          service: triton

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
