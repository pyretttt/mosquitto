# Tail container logs from Docker, enrich with container metadata, and
# ship into OpenSearch as the `mlops-logs-YYYY.MM.DD` index.

[sources.docker]
type = "docker_logs"
include_labels = ["logs=include"]

[transforms.parse_json]
type = "remap"
inputs = ["docker"]
source = '''
  parsed, err = parse_json(.message)
  if err == null {
    . = merge(., object!(parsed))
  } else {
    .raw = .message
  }
  .service = .label.com_docker_compose_service || "unknown"
'''

[sinks.opensearch]
type = "elasticsearch"
inputs = ["parse_json"]
endpoints = ["http://opensearch:9200"]
mode = "bulk"
api_version = "v7"
compression = "none"

[sinks.opensearch.bulk]
index = "mlops-logs-%Y.%m.%d"

[sinks.opensearch.healthcheck]
enabled = false
