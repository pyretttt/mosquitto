# Lint stage: python (ruff) + helm chart linting/templating.

ruff:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install ruff
  script:
    - ruff check model-server
    - ruff format --check model-server
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

helm-lint:
  stage: lint
  image:
    name: alpine/helm:3.16.2  # TODO(you): pin to a helm version you trust
    entrypoint: [""]
  before_script:
    - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    - helm repo add minio https://charts.min.io/
    - helm repo add apache-airflow https://airflow.apache.org
    - helm repo update
  script:
    # Build deps so umbrella charts can render, then lint + template each chart.
    - for c in monitoring storage orchestration; do helm dependency build charts/$c; done
    - helm lint charts/monitoring charts/storage charts/orchestration charts/model-server
    - helm template charts/model-server -f charts/model-server/values-local.yaml > /dev/null
    - helm template charts/monitoring -f charts/monitoring/values-local.yaml > /dev/null
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - charts/**/*
    - if: '$CI_COMMIT_BRANCH'
      changes:
        - charts/**/*
