apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "model-server.fullname" . }}-config
  labels:
    {{- include "model-server.labels" . | nindent 4 }}
data:
  MODEL_KEY: {{ .Values.config.modelKey | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  MLFLOW_TRACKING_URI: {{ .Values.mlflow.trackingUri | quote }}
