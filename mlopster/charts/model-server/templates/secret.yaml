# Admin token secret, only rendered when not using an existing Secret.
# TODO(you): prefer adminToken.existingSecret and keep this out of git.
{{- if not .Values.adminToken.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "model-server.fullname" . }}-admin
  labels:
    {{- include "model-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_TOKEN: {{ .Values.adminToken.value | quote }}
{{- end }}
