# Single source of truth for S3 connection info, as a Secret in the storage
# namespace. Other components (model-server, airflow) need the same data in
# THEIR namespace — either copy this, or (better) manage all of them with
# External Secrets / Sealed Secrets (see docs/ADMIN_TASKS.md).
#
# The access key / secret key mirror minio.rootUser / minio.rootPassword.
{{- if .Values.s3Secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.s3Secret.name }}
  labels:
    app.kubernetes.io/part-of: mlopster
  annotations:
   reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
   reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
   reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "{{ .Values.app.modelServer.namespace }},{{ .Values.app.orchestration.namespace }},{{ .Release.Namespace }}"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ index .Values "minio" "rootUser" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ index .Values "minio" "rootPassword" | quote }}
  AWS_DEFAULT_REGION: {{ .Values.s3Secret.region | quote }}
  S3_ENDPOINT_URL: {{ .Values.s3Secret.endpoint | quote }}
  S3_DATA_BUCKET: {{ .Values.s3Secret.dataBucket | quote }}
  S3_MODELS_BUCKET: {{ .Values.s3Secret.modelsBucket | quote }}
{{- end }}
