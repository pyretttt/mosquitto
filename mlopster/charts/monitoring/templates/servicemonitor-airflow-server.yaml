# ServiceMonitor: tells the Prometheus Operator to scrape the model server.
# This is the CRD-first way to register a scrape target (vs editing
# prometheus.yml or using additionalScrapeConfigs). The operator finds this
# because of the `release` label below matching the Prometheus instance.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: airflow
  # Lives in the orchestration namespace; selects Services in the app namespace.
  labels:
    {{- include "monitoring.crdLabels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.app.airflow.namespace }}
  selector:
    matchLabels:
      {{- toYaml .Values.app.airflow.matchLabels | nindent 6 }}
  endpoints:
    - port: {{ .Values.app.airflow.metricsPort }}
      path: {{ .Values.app.airflow.metricsPath }}
      interval: 30s
      scrapeTimeout: 10s
