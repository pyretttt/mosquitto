# ServiceMonitor: tells the Prometheus Operator to scrape the model server.
# This is the CRD-first way to register a scrape target (vs editing
# prometheus.yml or using additionalScrapeConfigs). The operator finds this
# because of the `release` label below matching the Prometheus instance.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: model-server
  # Lives in the monitoring namespace; selects Services in the app namespace.
  labels:
    {{- include "monitoring.crdLabels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.app.modelServer.namespace }}
  selector:
    matchLabels:
      {{ .Values.app.modelServer.serviceSelectorLabel }}: {{ .Values.app.modelServer.serviceSelectorValue }}
  endpoints:
    - port: {{ .Values.app.modelServer.metricsPort }}
      path: {{ .Values.app.modelServer.metricsPath }}
      interval: 30s
      scrapeTimeout: 10s
