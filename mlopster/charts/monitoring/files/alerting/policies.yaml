# Grafana notification policy tree (provisioned). Routes severity=critical to
# the webhook contact point; everything else falls through to the default.
apiVersion: 1
policies:
  - orgId: 1
    receiver: webhook-default
    group_by: ["grafana_folder", "alertname"]
    routes:
      - receiver: webhook-default
        object_matchers:
          - ["severity", "=", "critical"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
