# Release: image contains code and cfg; no bind mounts.
# Usage: docker compose -f docker-compose.release.yml up --build -d
services:
  open_monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CHAT_ID: ${CHAT_ID}
      RUNLOOP_INTERVAL_SEC: ${RUNLOOP_INTERVAL_SEC:-60}
    volumes:
      - ./runtime:/runtime
    restart: unless-stopped
