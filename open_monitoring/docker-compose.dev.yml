# Development: bind-mount source and config; restart process on *.py changes under src/.
# --no-restart-on-command-exit: only restart on file events, not when the app exits (avoids a tight loop for short-lived runs).
# Usage: docker compose -f docker-compose.dev.yml up --build
services:
  open_monitoring:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-dev.txt
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CHAT_ID: ${CHAT_ID}
      DRY_RUN: ${DRY_RUN}
      RUNLOOP_INTERVAL_SEC: ${RUNLOOP_INTERVAL_SEC:-60}
    volumes:
      - ./src:/app/src
    command:
      - watchmedo
      - auto-restart
      - --directory=src
      - "--pattern=*.py"
      - --recursive
      - --no-restart-on-command-exit
      - --
      - python
      - -m
      - src.app
