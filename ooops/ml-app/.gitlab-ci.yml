# CI for the ml-app. This file is intentionally 80% done — the last 20% is
# yours to finish (see docs/LEARNING_PATH.md). Commit it to a GitLab project
# whose repo root is ml-app/.
#
# Pipeline stages:
#   lint  → ruff
#   test  → pytest (model stubbed; no MLflow needed)
#   train → spin up MLflow tracking server as a service, run src.train,
#           publish run_id as a dotenv artifact.
#   build → build the Docker image, push to GitLab Container Registry.

stages:
  - lint
  - test
  - train
  - build

# Shared defaults.
default:
  image: python:3.11-slim
  before_script:
    - python -V
    - pip install --no-cache-dir -r requirements-dev.txt
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  tags:
    - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: lint
  script:
    - ruff check src tests

test:
  stage: test
  script:
    - pytest -q

train:
  stage: train
  # TODO(you): replace this with a proper MLflow service or point at the
  # shared MLflow server via MLFLOW_TRACKING_URI (set in GitLab CI/CD Variables).
  # For now we use a local file-store so the job is self-contained. ✅
  # Added configured CI/CD variables. MLFlow is reached through `host.docker.internal`
  variables:
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_EXPERIMENT_NAME: "iris-classifier-ci"
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
  script:
    - python -m src.train
  artifacts:
    paths:
      - mlruns/
    expire_in: 1 week

# Build + push to GitLab Container Registry using Kaniko.
# No Docker-in-Docker: Kaniko builds OCI images in userspace, no daemon, no
# privileged caps, no socket mounts. The runner pulls this image and runs
# /kaniko/executor as the job — a single container, no sidecar service.
#
# TODO(you):
#   1. Enable the Container Registry for your project in GitLab.
#   2. Uncomment the `--destination` push line once the registry is set up;
#      drop `--no-push` to actually publish.
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  before_script: []
  script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}' \
        "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
    - /kaniko/executor
        --context "$CI_PROJECT_DIR"
        --dockerfile "$CI_PROJECT_DIR/Dockerfile"
        --destination "$IMAGE"
        --no-push
    # Once the registry is enabled, drop --no-push above and Kaniko will publish.
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
