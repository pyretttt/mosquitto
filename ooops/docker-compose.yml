name: mlops

# =============================================================================
# This compose file is intentionally a starting point. The TODO(you) comments
# below mark deliberate gaps for you to fix. None of them break the basic
# `up`, but together they're the difference between "it runs on my laptop"
# and "it survives a reboot, an OOM, and a hostile dependency".
#
# Open issues you'll find inline:
#   * No resource limits on any service. One pip install will OOM your laptop.
#   * No healthchecks anywhere. `depends_on` is a lie without them.
#   * Secrets passed as plain env vars (Grafana admin password, etc.).
#   * Single bridge network — no isolation between data plane and control plane.
#   * GitLab Runner has the host docker socket — the classic foot-gun.
#   * No log rotation; container logs grow until the disk dies.
# =============================================================================

# One network for everything. Service names resolve as DNS (e.g. http://mlflow:5000).
# TODO(you): split into two networks — `data` (mlflow, ml-app, prometheus,
# grafana, exporters) and `ci` (gitlab, gitlab-runner). Then attach ml-app to
# both so CI can reach it for smoke tests, but GitLab can't see Prometheus.
networks:
  mlops:
    driver: bridge

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  gitlab-runner-config:
  mlflow-artifacts:
  mlflow-db:
  prometheus-data:
  grafana-data:

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # GitLab CE — source of truth for code + pipeline orchestrator.
  # WARNING: needs ~4 GB RAM. First boot takes ~5 min. Start it on demand.
  # ---------------------------------------------------------------------------
  # TODO(you): pin a resource ceiling. GitLab will eat all your RAM otherwise.
  # Add:
  #   deploy:
  #     resources:
  #       limits: { cpus: "2", memory: "4G" }
  # (Compose v2 honours `deploy.resources.limits` even outside Swarm.)
  # TODO(you): add a healthcheck so we know when GitLab is *actually* ready,
  # not just when the container started. Hint: HTTP GET /-/readiness on :80.
  # gitlab:
  #   <<: *service-defaults
  #   image: gitlab/gitlab-ce:17.5.2-ce.0
  #   hostname: gitlab.local
  #   environment:
  #     GITLAB_OMNIBUS_CONFIG: |
  #       external_url '${GITLAB_EXTERNAL_URL:-http://localhost:8080}'
  #       gitlab_rails['gitlab_shell_ssh_port'] = 2222
  #       # Turn off things we don't need locally to save RAM.
  #       prometheus_monitoring['enable'] = false
  #       alertmanager['enable'] = false
  #       grafana['enable'] = false
  #       puma['worker_processes'] = 2
  #   ports:
  #     - "8080:80"
  #     - "2222:22"
  #   volumes:
  #     - gitlab-config:/etc/gitlab
  #     - gitlab-logs:/var/log/gitlab
  #     - gitlab-data:/var/opt/gitlab
  #   shm_size: 256m
  #   networks: [mlops]
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "2"
  #         memory: "4G"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "${GITLAB_EXTERNAL_URL:-http://localhost:8080}/health-check"]
  #     interval: 10s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 5s


  # ---------------------------------------------------------------------------
  # GitLab Runner — executes CI jobs. Registered manually (see scripts/register-runner.sh).
  # Docker-in-Docker via the host daemon (simple, not prod-safe).
  # ---------------------------------------------------------------------------
  # TODO(you): the docker.sock mount means any pipeline job can root the host.
  # Acceptable for local-only learning; never for shared infra. When you move
  # to k8s, switch the executor from `docker` to `kubernetes` (each job gets
  # its own pod) and delete this volume.
  gitlab-runner:
    <<: *service-defaults
    image: gitlab/gitlab-runner:v17.5.2
    volumes:
      - gitlab-runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [mlops]


  mlflow-db:
    <<: *service-defaults
    image: postgres:16
    volumes:
      - mlflow-db:/var/lib/postgresql/data
    networks: [mlops]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mlflow-artifacts:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mlflow-artifacts:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mlflowadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mlflowsecret}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [mlops]


  createbuckets:
    image: quay.io/minio/mc:latest
    depends_on:
      mlflow-artifacts:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set minio http://mlflow-artifacts:9000 ${MINIO_ROOT_USER:-mlflowadmin} ${MINIO_ROOT_PASSWORD:-mlflowsecret};
      /usr/bin/mc mb --ignore-existing minio/mlflow;
      "
    networks: [mlops]

  # ---------------------------------------------------------------------------
  # MLflow tracking server. SQLite backend + local artifact store served through
  # the server (--serve-artifacts), so ml-app never needs direvct FS access.
  # ---------------------------------------------------------------------------
  # TODO(you): SQLite is single-writer. The moment you have parallel CI jobs
  # logging runs, you'll see "database is locked". Add a `mlflow-db` Postgres
  # service and switch `--backend-store-uri` to `postgresql://...`. ✅
  # TODO(you): no healthcheck. Add one (HTTP GET /health on :5000) so ml-app
  # can declare a meaningful `depends_on: { condition: service_healthy }`.
  # The base image (`python:3.11-slim`) has no curl/wget — use a python
  # one-liner in the healthcheck command. ✅
  mlflow:
    <<: *service-defaults
    build:
      context: ./mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow/auth_config.ini:/mlflow/auth_config.ini:ro
    depends_on:
      mlflow-db:
        condition: service_healthy
      mlflow-artifacts:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      MLFLOW_AUTH_CONFIG_PATH: /mlflow/auth_config.ini
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY:-1x2x3x4x5x6x7x8x9x0}
      MLFLOW_S3_ENDPOINT_URL: http://mlflow-artifacts:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-mlflowadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-mlflowsecret}
      MLFLOW_SERVER_ALLOWED_HOSTS: localhost,localhost:5001,127.0.0.1,mlflow,mlflow:5000,host.docker.internal
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@mlflow-db:5432/${POSTGRES_DB:-mlflow}
      --artifacts-destination s3://mlflow
      --serve-artifacts
      --app-name basic-auth
    networks: [mlops]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # ML app — FastAPI inference service. Trains on startup if no model is
  # registered yet, then serves /predict. Exposes /metrics for Prometheus.
  # ---------------------------------------------------------------------------
  # TODO(you): once you add /health to the API (see ml-app/TODO.md), wire it
  # in here so unhealthy containers get restarted automatically:
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=2).status==200 else 1)"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #     start_period: 30s ✅
  # TODO(you): set sane resource limits. Without them, a runaway training run
  # in this container can starve Prometheus + Grafana of CPU. ✅
  ml-app:
    <<: *service-defaults
    build:
      context: ./ml-app
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-iris-classifier}
      ML_MODEL_NAME: ${ML_MODEL_NAME:-iris-classifier}
      ML_MODEL_STAGE: ${ML_MODEL_STAGE:-None}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-adminpassword}
    networks: [mlops]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes ml-app, node-exporter, cAdvisor.
  # ---------------------------------------------------------------------------
  # TODO(you): add Alertmanager as a sibling service and uncomment the
  # `alerting:` block in prometheus/prometheus.yml. See prometheus/TODO.md. ✅
  # TODO(you): mount `prometheus-data` is fine but you have no log rotation
  # and no `--storage.tsdb.retention.size` cap. Set both before you walk away
  # from this running for a week. ✅
  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    networks: [mlops]

  # ---------------------------------------------------------------------------
  # Grafana — dashboards. Provisioned with Prometheus datasource + starter dash.
  # ---------------------------------------------------------------------------
  # TODO(you): the admin password is in plain env vars (and worse, defaulted
  # to "admin"). Move it to a docker secret:
  #   secrets:
  #     grafana_admin_password:
  #       file: ./secrets/grafana_admin_password
  # then reference via GF_SECURITY_ADMIN_PASSWORD__FILE. Same pattern works
  # for Postgres credentials when you add Postgres for MLflow.
  grafana:
    <<: *service-defaults
    image: grafana/grafana:11.2.2
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks: [mlops]

  # ---------------------------------------------------------------------------
  # node-exporter — host-level metrics (CPU/mem/disk/net).
  # On macOS these reflect the Linux VM that runs Docker, not your Mac proper.
  # ---------------------------------------------------------------------------
  node-exporter:
    <<: *service-defaults
    image: prom/node-exporter:v1.8.2
    pid: host
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/:/host:ro'
    networks: [mlops]

  # ---------------------------------------------------------------------------
  # cAdvisor — per-container CPU/mem/network/fs.
  # ---------------------------------------------------------------------------
  # Keep CPU/memory/network/start-time metrics for the container dashboard and
  # drop high-cardinality collectors we do not render.
  # TODO(you): `privileged: true` is heavy. Document why it's needed, or
  # tighten down to specific capabilities (CAP_SYS_ADMIN, etc.).
  cadvisor:
    <<: *service-defaults
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    command:
      - --disable_metrics=accelerator,advtcp,app,cpuLoad,cpu_topology,cpuset,disk,diskIO,hugetlb,memory_numa,oom_event,perf_event,process,referenced_memory,resctrl,sched,tcp,udp
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks: [mlops]

  blackbox-exporter:
    <<: *service-defaults
    image: quay.io/prometheus/blackbox-exporter:latest
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox_exporter/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks: [mlops]

  alertmanager:
    <<: *service-defaults
    image: quay.io/prometheus/alertmanager:v0.32.0
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [mlops]