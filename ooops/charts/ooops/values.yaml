mlops:
  deploy:
    name: mlops
    replicas: 2
    labels:
      app: mlops
    port: 8080
    image: registry.gitlab.com/percalee/oops:latest
    resources:
      requests:
        memory: 128Mi
        cpu: 0.1
  # Block mlops pods until the mlflow subchart Service responds on /health.
  mlflowWait:
    enabled: true
    port: 80
    path: /health
    timeoutSeconds: 300
    intervalSeconds: 2
    image: curlimages/curl:8.11.1

mlflow:
  fullnameOverride: mlflow-service
  postgresql:
    enabled: true
    # mlflow expects the service at {release}-mlflow-postgresql, but Bitnami
    # defaults to {release}-postgresql when mlflow is used as a subchart.
    fullnameOverride: mlflow-service-postgresql
    usernameKey: "username"
    passwordKey: "password"
  backendStore:
    databaseMigration: true
  artifactRoot:
    s3:
      enabled: true
      bucket: mlflow
      awsAccessKeyId: minioadmin
      awsSecretAccessKey: minioadmin
  extraEnvVars:
    MLFLOW_S3_ENDPOINT_URL: http://minio-service:9000
  serviceMonitor:
    enabled: true

minio:
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  fullnameOverride: minio-service
  mode: standalone
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: 1Gi
  accessKey: "minioadmin"  # Change this
  secretKey: "minioadminsecret"  # Change this
  buckets:
  - name: mlflow
    policy: none
    purge: false
  service:
    type: ClusterIP

initContainers:
  - name: create-minio-bucket
    image: minio/mc:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        mc alias set minio http://minio-service:9000 minioadmin minioadmin
        mc mb --ignore-existing minio/mlflow
