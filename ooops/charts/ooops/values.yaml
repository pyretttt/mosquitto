mlops:
  deploy:
    name: mlops
    replicas: 2
    labels:
      app: mlops
    port: 8080
    image: registry.gitlab.com/percalee/oops:latest
    resources:
      requests:
        memory: 128Mi
        cpu: 0.1
  # Block mlops pods until the mlflow subchart Service responds on /health.
  mlflowWait:
    enabled: true
    port: 80
    path: /health
    timeoutSeconds: 300
    intervalSeconds: 2
    image: curlimages/curl:8.11.1

mlflow:
  fullnameOverride: mlflow-service
  postgresql:
    enabled: true
    # mlflow expects the service at {release}-mlflow-postgresql, but Bitnami
    # defaults to {release}-postgresql when mlflow is used as a subchart.
    fullnameOverride: mlflow-service-postgresql
    auth:
      username: mlflow
      password: mlflow
      database: mlflow
  backendStore:
    databaseMigration: true
  artifactRoot:
    # Match docker-compose --serve-artifacts: clients fetch artifacts via MLflow.
    proxiedArtifactStorage: true
    s3:
      enabled: true
      bucket: mlflow
      awsAccessKeyId: mlflowadmin
      awsSecretAccessKey: mlflowsecret
  extraEnvVars:
    # RustFS chart exposes the S3 API on {fullnameOverride}-svc.
    MLFLOW_S3_ENDPOINT_URL: http://rustfs-service-svc:9000
  # MLflow does not create S3 buckets; ensure the artifact bucket exists before start.
  initContainers:
    - name: create-rustfs-bucket
      image: amazon/aws-cli:2.22.35
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          ENDPOINT="http://rustfs-service-svc:9000"
          until aws --endpoint-url "$ENDPOINT" s3api list-buckets >/dev/null 2>&1; do
            echo "waiting for rustfs at ${ENDPOINT}..."
            sleep 2
          done
          if ! aws --endpoint-url "$ENDPOINT" s3api head-bucket --bucket mlflow 2>/dev/null; then
            aws --endpoint-url "$ENDPOINT" s3 mb "s3://mlflow"
          fi
          echo "rustfs bucket mlflow is ready"
      env:
        - name: AWS_ACCESS_KEY_ID
          value: mlflowadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: mlflowsecret
        - name: AWS_DEFAULT_REGION
          value: us-east-1
  serviceMonitor:
    enabled: true

rustfs:
  fullnameOverride: rustfs-service
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  secret:
    rustfs:
      access_key: mlflowadmin
      secret_key: mlflowsecret
  ingress:
    enabled: false
  # RustFS defaults to storageClass "local-path" (k3d/kind). This cluster uses "standard".
  storageclass:
    name: standard