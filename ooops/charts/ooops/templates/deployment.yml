apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mlops.deploy.name }}-deploy
  labels:
    {{- toYaml .Values.mlops.deploy.labels | nindent 4 }}
spec:
  replicas: {{ .Values.mlops.deploy.replicas }}
  selector:
    matchLabels:
      {{- toYaml .Values.mlops.deploy.labels | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- toYaml .Values.mlops.deploy.labels | nindent 8 }}
    spec:
      {{- if .Values.mlops.mlflowWait.enabled }}
      initContainers:
      - name: wait-for-mlflow
        image: {{ .Values.mlops.mlflowWait.image }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            host="{{ .Values.mlflow.fullnameOverride }}"
            port="{{ .Values.mlops.mlflowWait.port }}"
            path="{{ .Values.mlops.mlflowWait.path }}"
            timeout="{{ .Values.mlops.mlflowWait.timeoutSeconds }}"
            interval="{{ .Values.mlops.mlflowWait.intervalSeconds }}"
            echo "Waiting for mlflow at http://${host}:${port}${path}..."
            elapsed=0
            until curl -sf "http://${host}:${port}${path}"; do
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out after ${timeout}s waiting for mlflow"
                exit 1
              fi
              sleep "$interval"
              elapsed=$((elapsed + interval))
            done
            echo "mlflow is ready"
      {{- end }}
      containers:
      - name: {{ .Values.mlops.deploy.name }}
        image: {{ .Values.mlops.deploy.image }}
        ports:
        - containerPort: {{ .Values.mlops.deploy.port }}
        resources:
          requests:
            memory: {{ .Values.mlops.deploy.resources.requests.memory }}
            cpu: {{ .Values.mlops.deploy.resources.requests.cpu }}
        env:
          - name: MLFLOW_TRACKING_URI
            value: http://{{ .Values.mlflow.fullnameOverride }}:{{ .Values.mlops.mlflowWait.port }}
          - name: MLFLOW_EXPERIMENT_NAME
            value: iris-classifier
          - name: ML_MODEL_NAME
            value: iris-classifier
          - name: ML_MODEL_STAGE
            value: None
          - name: ADMIN_TOKEN
            value: mlapp-admin
          - name: MLFLOW_TRACKING_USERNAME
            value: admin
          - name: MLFLOW_TRACKING_PASSWORD
            value: adminpassword


