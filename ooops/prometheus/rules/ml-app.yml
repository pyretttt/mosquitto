# Example alert rules. Just one rule here — the rest is for you to write.
# See: https://prometheus.io/docs/practices/alerting/
groups:
  - name: ml-app
    interval: 30s
    rules:
      - alert: MlAppDown
        # `up` is 1 when the scrape succeeded, 0 when it failed.
        expr: up{job="ml-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ml-app is down"
          description: "Prometheus has failed to scrape ml-app for more than 1 minute."
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="ml-app"}[5m]))) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High latency p95"
          description: "The p95 latency of the ml-app is greater than 0.5 seconds for 1 minute."
      - alert: HighErrorRate 5xx
        expr: ((sum by (job) (rate(http_requests_total{status="5xx"}[5m])) / sum by (job) (rate(http_requests_total[5m]))) or vector(0)) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate 5xx"
          description: "The error rate of the ml-app is greater than 5% for 1 minute."
      - alert: HighErrorRate 4xx
        expr: ((sum by (job) (rate(http_requests_total{status="4xx"}[5m])) / sum by (job) (rate(http_requests_total[5m]))) or vector(0)) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate 4xx"
          description: "The error rate of the ml-app is greater than 5% for 1 minute."
      - alert: NoTrafficForModel
        expr: rate(ml_predictions_total{job="ml-app"}[10m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No traffic for model"
          description: "The model has not received any traffic for 15 minutes."
