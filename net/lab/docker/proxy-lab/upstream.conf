server {
    listen 80 default_server;
    server_name _;
    add_header X-Upstream "yes" always;

    location / {
        return 200 "hello from upstream, request id $request_id, scheme $scheme\n";
        default_type text/plain;
    }

    location /chunked {
        return 200 "first\nsecond\nthird\n";
        default_type text/plain;
    }
}
