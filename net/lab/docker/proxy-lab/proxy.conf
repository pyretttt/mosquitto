events {}

http {
    upstream backend {
        server upstream:80;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        listen 80 http2;
        server_name _;
        access_log /dev/stdout;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }
}
