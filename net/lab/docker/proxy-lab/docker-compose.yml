# Proxy lab for W3 (HTTP) and reused in W12 (TLS termination).
#
# Topology: client --HTTP/1.1 or /2--> nginx-proxy --HTTP/1.1--> upstream
#
#   docker compose up -d
#   docker compose exec client curl -v --http1.1 http://proxy/
#   docker compose exec client curl -v --http2-prior-knowledge http://proxy/
#   docker compose exec debug tcpdump -ni eth0 -w /tmp/proxy.pcap

services:
  upstream:
    image: nginx:1.27-alpine
    container_name: proxy-upstream
    volumes:
      - ./upstream.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      proxy-lab:
        ipv4_address: 10.40.0.10

  proxy:
    image: nginx:1.27-alpine
    container_name: proxy-front
    volumes:
      - ./proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      proxy-lab:
        ipv4_address: 10.40.0.20
    depends_on:
      - upstream

  client:
    image: nicolaka/netshoot
    container_name: proxy-client
    command: sleep infinity
    networks:
      proxy-lab:
        ipv4_address: 10.40.0.30

  debug:
    image: nicolaka/netshoot
    network_mode: "service:proxy"
    cap_add: [NET_ADMIN, NET_RAW]
    command: sleep infinity

networks:
  proxy-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.0.0/24
